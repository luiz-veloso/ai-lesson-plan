services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: file:/data/dev.db
      AI_API_KEY: ${AI_API_KEY}
      PORT: '3000'
      NODE_ENV: development
    volumes:
      - ./backend/sqlite:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE: http://localhost:3000
    depends_on:
      - backend
